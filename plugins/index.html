<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S9Y 网关管理面板</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4ed;
      --muted: #8b8fa3;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --cyan: #06b6d4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-actions .ts {
      font-size: 12px;
      color: var(--muted);
    }

    button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }

    button:hover {
      border-color: var(--muted);
    }

    button.danger {
      border-color: var(--red);
      color: var(--red);
    }

    button.danger:hover {
      background: var(--red);
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      background: var(--card);
    }

    .tabs button {
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      padding: 12px 20px;
      font-size: 14px;
      background: transparent;
      margin-bottom: -1px;
    }

    .tabs button.active {
      border-bottom-color: var(--blue);
      color: var(--blue);
    }

    main {
      padding: 24px;
      max-width: 1400px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 24px;
      font-weight: 700;
    }

    .section-title {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, .02);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .badge-pending {
      background: var(--yellow);
      color: #000;
    }

    .badge-assigned {
      background: var(--cyan);
      color: #000;
    }

    .badge-in_progress {
      background: var(--blue);
      color: #fff;
    }

    .badge-completed {
      background: var(--green);
      color: #000;
    }

    .badge-failed {
      background: var(--orange);
      color: #000;
    }

    .badge-dead_letter {
      background: var(--red);
      color: #fff;
    }

    .badge-ws {
      background: var(--purple);
      color: #fff;
    }

    .badge-http {
      background: var(--blue);
      color: #fff;
    }

    .badge-fun {
      background: var(--green);
      color: #000;
    }

    .timeline-pop {
      display: none;
      position: absolute;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 20;
      min-width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .6);
    }

    .timeline-pop .tl-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 4px 0;
      font-size: 12px;
    }

    .tl-row .tl-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .tl-row .tl-time {
      color: var(--muted);
      min-width: 60px;
    }

    .tl-row .tl-status {
      font-weight: 600;
      min-width: 80px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 420px;
      width: 90%;
    }

    .modal h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .modal .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .mono {
      font-family: "JetBrains Mono", "Fira Code", monospace;
      font-size: 12px;
    }

    .cap-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      background: var(--border);
      margin: 1px 2px;
    }

    .refresh-hint {
      font-size: 11px;
      color: var(--muted);
      margin-left: 8px;
    }
  </style>
</head>

<body>

  <header>
    <h1><span class="dot"></span>S9Y 网关</h1>
    <div class="header-actions">
      <span class="ts" id="clock"></span>
      <button onclick="refresh()">刷新</button>
      <button class="danger" onclick="showShutdown()">关机</button>
    </div>
  </header>

  <div class="tabs">
    <button id="tab-pivots" class="active" onclick="switchTab('pivots')">支点列表</button>
    <button id="tab-tasks" onclick="switchTab('tasks')">任务列表</button>
  </div>

  <main>
    <!-- stats bar -->
    <div class="stats" id="stats"></div>

    <!-- pivots tab -->
    <div id="panel-pivots">
      <div class="section-title">已注册支点 <span class="refresh-hint" id="pivot-count"></span></div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Pivot ID</th>
              <th>类型</th>
              <th>名称</th>
              <th>适配器</th>
              <th>能力标签</th>
              <th>连接时间</th>
              <th>最后心跳</th>
            </tr>
          </thead>
          <tbody id="pivot-tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="pivot-empty" style="display:none">暂无已注册的支点</div>
    </div>

    <!-- tasks tab -->
    <div id="panel-tasks" style="display:none;">
      <div class="section-title">活跃中的任务 <span class="refresh-hint" id="task-count"></span></div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Task ID</th>
              <th>状态</th>
              <th>进度</th>
              <th>发布者</th>
              <th>执行者</th>
              <th>重试</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="task-tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="task-empty" style="display:none">暂无活跃任务</div>

      <div class="section-title" style="margin-top:32px;">已完成 / 死信 <span class="refresh-hint" id="dead-count"></span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Task ID</th>
              <th>状态</th>
              <th>发布者</th>
              <th>执行者</th>
              <th>错误信息</th>
              <th>完成时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="dead-tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="dead-empty" style="display:none">暂无终态任务</div>

      <div class="section-title" style="margin-top:32px;">缓存结果 <span class="refresh-hint" id="cache-count"></span></div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Task ID</th>
              <th>缓存时间</th>
              <th>过期时间</th>
              <th>TTL</th>
            </tr>
          </thead>
          <tbody id="cache-tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="cache-empty" style="display:none">暂无缓存</div>
    </div>
  </main>

  <!-- timeline popup -->
  <div class="timeline-pop" id="timeline-pop"></div>

  <!-- shutdown modal -->
  <div class="modal-overlay" id="shutdown-modal">
    <div class="modal">
      <h2>确认关机</h2>
      <p>关闭网关后，所有连接将断开，正在进行的任务可能丢失。确定要关闭网关服务吗？</p>
      <div class="actions">
        <button onclick="hideShutdown()">取消</button>
        <button class="danger" onclick="doShutdown()">确认关机</button>
      </div>
    </div>
  </div>

  <script>
    const STATUS_LABELS = {
      pending: '待分配', assigned: '已分配', in_progress: '进行中',
      completed: '已完成', failed: '已失败', dead_letter: '死信'
    };
    const STATUS_COLORS = {
      pending: 'var(--yellow)', assigned: 'var(--cyan)', in_progress: 'var(--blue)',
      completed: 'var(--green)', failed: 'var(--orange)', dead_letter: 'var(--red)'
    };

    let currentTab = 'pivots';
    let pivotsData = [];
    let tasksData = [];
    let terminalData = [];
    let cacheData = [];

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-pivots').style.display = tab === 'pivots' ? '' : 'none';
      document.getElementById('panel-tasks').style.display = tab === 'tasks' ? '' : 'none';
      render();
    }

    async function refresh() {
      try {
        const res = await fetch('admin/api/status');
        const data = await res.json();
        pivotsData = data.pivots || [];
        tasksData = data.tasks || [];
        terminalData = data.terminal || [];
        cacheData = data.cached || [];
      } catch (e) {
        console.error('获取数据失败:', e);
      }
      render();
    }

    function render() {
      renderStats();
      if (currentTab === 'pivots') renderPivots();
      else renderTasks();
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
    }

    function renderStats() {
      const pivots = pivotsData.length;
      const active = tasksData.length;
      const completed = terminalData.filter(t => t.status === 'completed').length;
      const dead = terminalData.filter(t => t.status === 'dead_letter').length;
      const cached = cacheData.length;
      document.getElementById('stats').innerHTML =
        `<div class="stat"><div class="label">在线支点</div><div class="value">${pivots}</div></div>` +
        `<div class="stat"><div class="label">活跃任务</div><div class="value">${active}</div></div>` +
        `<div class="stat"><div class="label">完成任务</div><div class="value" style="color:var(--green)">${completed}</div></div>` +
        `<div class="stat"><div class="label">死信任务</div><div class="value" style="color:var(--red)">${dead}</div></div>` +
        `<div class="stat"><div class="label">缓存结果</div><div class="value" style="color:var(--cyan)">${cached}</div></div>`;
    }

    function renderPivots() {
      const tbody = document.getElementById('pivot-tbody');
      document.getElementById('pivot-count').textContent = `(${pivotsData.length})`;
      if (!pivotsData.length) {
        tbody.innerHTML = '';
        document.getElementById('pivot-empty').style.display = '';
        return;
      }
      document.getElementById('pivot-empty').style.display = 'none';
      tbody.innerHTML = pivotsData.map(p => {
        const caps = (p.capabilities || []).map(c => `<span class="cap-tag">${esc(c)}</span>`).join('') || '-';
        const adapterBadge = `<span class="badge badge-${p.adapterType}">${p.adapterType}</span>`;
        const connectedAt = p.status?.connectedAt ? new Date(p.status.connectedAt).toLocaleString('zh-CN') : '-';
        const heartbeat = p.status?.lastHeartbeatAt ? new Date(p.status.lastHeartbeatAt).toLocaleString('zh-CN') : '-';
        return `<tr>
      <td class="mono">${esc(p.pivotId)}</td>
      <td>${esc(p.type || '-')}</td>
      <td>${esc(p.name || '-')}</td>
      <td>${adapterBadge}</td>
      <td>${caps}</td>
      <td>${connectedAt}</td>
      <td>${heartbeat}</td>
    </tr>`;
      }).join('');
    }

    function renderTasks() {
      const tbody = document.getElementById('task-tbody');
      document.getElementById('task-count').textContent = `(${tasksData.length})`;
      if (!tasksData.length) {
        tbody.innerHTML = '';
        document.getElementById('task-empty').style.display = '';
      } else {
        document.getElementById('task-empty').style.display = 'none';
        tbody.innerHTML = tasksData.map(t => {
          const sb = STATUS_LABELS[t.status] || t.status;
          const badgeClass = 'badge-' + t.status;
          const progress = t.progress != null ? `${t.progress}%` : '-';
          return `<tr>
            <td class="mono" title="${esc(t.taskId)}">${esc(truncate(t.taskId, 24))}</td>
            <td><span class="badge ${badgeClass}">${sb}</span></td>
            <td>${progress}</td>
            <td class="mono">${esc(truncate(t.publisherId, 16))}</td>
            <td class="mono">${esc(truncate(t.workerId || '-', 16))}</td>
            <td>${t.retryCount}/${t.maxRetries}</td>
            <td>${new Date(t.createdAt).toLocaleString('zh-CN')}</td>
            <td><button onclick="showTimeline(event, '${esc(t.taskId)}')">时间线</button></td>
          </tr>`;
        }).join('');
      }

      document.getElementById('dead-count').textContent = `(${terminalData.length})`;
      document.getElementById('dead-empty').style.display = terminalData.length ? 'none' : '';
      document.getElementById('dead-tbody').innerHTML = terminalData.map(t => {
        const sb = STATUS_LABELS[t.status] || t.status;
        const badgeClass = 'badge-' + t.status;
        return `<tr>
          <td class="mono" title="${esc(t.taskId)}">${esc(truncate(t.taskId, 24))}</td>
          <td><span class="badge ${badgeClass}">${sb}</span></td>
          <td class="mono">${esc(truncate(t.publisherId, 16))}</td>
          <td class="mono">${esc(truncate(t.workerId || '-', 16))}</td>
          <td>${t.error ? esc(truncate(t.error, 40)) : '-'}</td>
          <td>${t.completedAt ? new Date(t.completedAt).toLocaleString('zh-CN') : '-'}</td>
          <td><button onclick="showTimeline(event, '${esc(t.taskId)}')">时间线</button></td>
        </tr>`;
      }).join('');

      document.getElementById('cache-count').textContent = `(${cacheData.length})`;
      document.getElementById('cache-empty').style.display = cacheData.length ? 'none' : '';
      document.getElementById('cache-tbody').innerHTML = cacheData.map(c => `<tr>
        <td class="mono">${esc(truncate(c.taskId, 32))}</td>
        <td>${new Date(c.cachedAt).toLocaleString('zh-CN')}</td>
        <td>${new Date(c.expiresAt).toLocaleString('zh-CN')}</td>
        <td>${formatTTL(c.ttl)}</td>
      </tr>`).join('');
    }

    function showTimeline(ev, taskId) {
      const task = tasksData.find(t => t.taskId === taskId) || terminalData.find(t => t.taskId === taskId);
      if (!task || !task.timeline) return;
      const pop = document.getElementById('timeline-pop');
      pop.innerHTML = '<div style="font-weight:600;margin-bottom:8px;font-size:13px">任务时间线</div>' +
        '<div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:10px;word-break:break-all">' + esc(taskId) + '</div>' +
        task.timeline.map((tl, i) => {
          const color = STATUS_COLORS[tl.status] || 'var(--muted)';
          const time = new Date(tl.timestamp).toLocaleTimeString('zh-CN');
          const extra = tl.extra ? `<span style="color:var(--muted);font-size:11px">${esc(tl.extra)}</span>` : '';
          const wid = tl.workerId ? `<span style="color:var(--muted);font-size:11px">→ ${esc(tl.workerId)}</span>` : '';
          return `<div class="tl-row">
        <div class="tl-dot" style="background:${color}"></div>
        <div class="tl-time">${time}</div>
        <div class="tl-status" style="color:${color}">${STATUS_LABELS[tl.status] || tl.status}</div>
        <div>${wid} ${extra}</div>
      </div>`;
        }).join('');
      if (task.error) {
        pop.innerHTML += `<div style="margin-top:8px;padding:6px 8px;background:rgba(239,68,68,.1);border-radius:4px;font-size:12px;color:var(--red)">错误: ${esc(task.error)}</div>`;
      }
      pop.style.display = 'block';
      const rect = ev.target.getBoundingClientRect();
      pop.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
      pop.style.top = (rect.bottom + 6) + 'px';
      setTimeout(() => {
        const onClick = (e) => { if (!pop.contains(e.target)) { pop.style.display = 'none'; document.removeEventListener('click', onClick); } };
        document.addEventListener('click', onClick);
      }, 0);
    }

    function showShutdown() {
      document.getElementById('shutdown-modal').classList.add('show');
    }
    function hideShutdown() {
      document.getElementById('shutdown-modal').classList.remove('show');
    }
    async function doShutdown() {
      try {
        await fetch('shutdown');
        document.getElementById('shutdown-modal').classList.remove('show');
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--muted);font-size:18px">网关系统已尝试关机</div>';
      } catch (e) {
        alert('关机失败: ' + e.message);
      }
    }

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function truncate(s, n) { return String(s).length > n ? String(s).slice(0, n) + '...' : String(s); }
    function formatTTL(ms) { const s = ms / 1000; return s >= 60 ? `${Math.round(s / 60)}分钟` : `${Math.round(s)}秒`; }

    // auto-refresh
    refresh();
    setInterval(refresh, 3000);
  </script>
</body>

</html>
